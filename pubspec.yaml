name: truck_fleet
description: Sistema de seguimiento en tiempo real para empresa de camiones con Supabase y Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_riverpod: ^2.5.1
  location: ^5.0.3
  geolocator: ^12.0.0
  mobile_scanner: ^3.5.2
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  fl_chart: ^0.66.0
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.0
  flutter_local_notifications: ^17.0.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  google_maps_flutter: ^2.14.2
  http: ^1.2.0
  firebase_storage: ^11.7.7
  image_picker: ^1.2.2

# dependency_overrides:
#   latlong2:
